spring.application.name=demo
# 🔴 API 키는 application-local.properties 파일에 설정한다. (git 제외 파일)
# 🔴 실행 전 src/main/resources/application-local.properties 파일을 만들고:
# 🔴   gemini.api.key=발급받은_실제_키
# 🔴 형식으로 입력한다.
gemini.api.key=${GEMINI_API_KEY:로컬_설정_필요}

# 🔴 새로 추가한 부분: local 프로필을 활성화하여 application-local.properties 파일을 읽어오도록 설정한다. 🔴
spring.profiles.active=local

# 🔴 컨트롤러가 화면 이름을 반환할 때 찾아갈 JSP 파일의 기본 경로를 지정한다. 🔴
spring.mvc.view.prefix=/WEB-INF/views/
# 🔴 반환된 화면 이름 뒤에 자동으로 붙일 파일 확장자를 설정한다. 🔴
spring.mvc.view.suffix=.jsp

# 🔴 M1: H2 파일 모드 DB (MySQL 준비 전 임시 사용) 🔴
# 🔴 prepai-db.mv.db 파일이 프로젝트 루트에 생성된다. 🔴
spring.datasource.url=jdbc:h2:file:./prepai-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 🔴 M1: JPA 설정 — 앱 기동 시 엔티티 기반으로 테이블 자동 생성/업데이트 🔴
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 🔴 M1: H2 콘솔 (개발 확인용 — localhost:8080/h2-console) 🔴
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console